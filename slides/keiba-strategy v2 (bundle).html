document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"ja\"><head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n    <title>k-ba-man 競馬予想作戦スライド</title>\n    <style>\n      deck-stage:not(:defined) {\n        visibility: hidden;\n      }\n\n      :root {\n        color-scheme: light;\n        --ink: #14211d;\n        --muted: #5d6864;\n        --paper: #f7f8fb;\n        --surface: #ffffff;\n        --line: #d9ded9;\n        --green: #0f7a4f;\n        --green-soft: #dff2e9;\n        --red: #b33b32;\n        --red-soft: #f7dfdc;\n        --gold: #d99b18;\n        --gold-soft: #fff1cf;\n        --blue: #315b96;\n        --blue-soft: #dfeaff;\n        --violet: #7651a8;\n        --violet-soft: #ebe2f7;\n        --radius: 10px;\n      }\n\n      * {\n        box-sizing: border-box;\n      }\n\n      html,\n      body {\n        margin: 0;\n        background: #14211d;\n      }\n\n      deck-stage {\n        font-family:\n          \"Hiragino Sans\", \"Yu Gothic\", \"YuGothic\", \"Noto Sans JP\",\n          system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n        color: var(--ink);\n      }\n\n      deck-stage > section {\n        display: grid;\n        align-content: center;\n        gap: 72px;\n        padding: 110px 130px;\n        background:\n          linear-gradient(90deg, rgb(15 122 79 / 5%) 1px, transparent 1px),\n          linear-gradient(rgb(15 122 79 / 4%) 1px, transparent 1px),\n          var(--paper);\n        background-size: 48px 48px;\n      }\n\n      deck-stage > section::after {\n        content: \"\";\n        position: absolute;\n        inset: 36px;\n        border: 1px dashed rgb(15 122 79 / 22%);\n        border-radius: 6px;\n        pointer-events: none;\n      }\n\n      deck-stage > section:not(.hero):not(.wisdom):not(.closing):not(.self-introduction):not(.recruit-company) {\n        align-content: start;\n      }\n\n      h1,\n      h2,\n      h3,\n      p,\n      ul {\n        margin: 0;\n      }\n\n      .kicker {\n        color: var(--green);\n        font-size: 24px;\n        font-weight: 800;\n        letter-spacing: 0.08em;\n      }\n\n      h1 {\n        font-size: 72px;\n        font-weight: 800;\n        line-height: 1.17;\n        letter-spacing: 0.01em;\n      }\n\n      h2 {\n        max-width: 1480px;\n        font-size: 44px;\n        font-weight: 800;\n        line-height: 1.3;\n        letter-spacing: 0.01em;\n      }\n\n      h3 {\n        font-size: 30px;\n        font-weight: 800;\n        line-height: 1.26;\n      }\n\n      .lead {\n        max-width: 1240px;\n        color: var(--muted);\n        font-size: 28px;\n        line-height: 1.85;\n        text-wrap: pretty;\n      }\n\n      .slide-head {\n        display: grid;\n        gap: 32px;\n        align-self: start;\n      }\n\n      /* ---------- slide 1 : hero ---------- */\n\n      .hero {\n        grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);\n        column-gap: 110px;\n        align-items: center;\n      }\n\n      .hero-copy {\n        display: grid;\n        gap: 40px;\n      }\n\n      .track-visual {\n        display: grid;\n        place-items: center;\n      }\n\n      .track {\n        position: relative;\n        width: 600px;\n        aspect-ratio: 1.28;\n        border: 44px solid #227454;\n        border-radius: 48% 48% 46% 46% / 54% 54% 46% 46%;\n        background:\n          radial-gradient(ellipse at center, #b98b53 0 40%, transparent 41%),\n          #e8c188;\n        box-shadow: inset 0 0 0 14px #e9f1e6, 0 24px 60px rgb(20 33 29 / 16%);\n      }\n\n      .track::before {\n        content: \"\";\n        position: absolute;\n        inset: -28px;\n        border: 3px dashed rgb(255 255 255 / 82%);\n        border-radius: inherit;\n      }\n\n      .runner {\n        position: absolute;\n        width: 52px;\n        height: 52px;\n        display: grid;\n        place-items: center;\n        border-radius: 999px;\n        background: var(--surface);\n        border: 3px solid var(--ink);\n        color: var(--ink);\n        font-size: 24px;\n        font-weight: 900;\n        box-shadow: 0 10px 22px rgb(20 33 29 / 20%);\n      }\n\n      .r1 { left: 10%; top: 14%; }\n      .r2 { left: 37%; top: 4%; }\n      .r3 { right: 18%; top: 13%; }\n      .r4 { right: 4%; top: 42%; }\n      .r5 { right: 16%; bottom: 12%; }\n      .r6 { left: 46%; bottom: 2%; }\n      .r7 { left: 17%; bottom: 11%; }\n      .r8 { left: 2%; top: 44%; }\n      .r9 { left: 28%; top: 36%; background: var(--green-soft); }\n      .r10 { right: 31%; top: 39%; background: var(--gold-soft); }\n\n      /* ---------- slide 2 : wisdom ---------- */\n\n      .wisdom {\n        grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);\n        column-gap: 100px;\n        align-items: center;\n      }\n\n      .wisdom-copy {\n        display: grid;\n        gap: 36px;\n      }\n\n      .formula-card {\n        display: grid;\n        gap: 36px;\n        padding: 64px;\n        background: var(--green-soft);\n        border: 1px solid #b8dccb;\n        border-radius: var(--radius);\n      }\n\n      .formula {\n        display: grid;\n        gap: 18px;\n        color: var(--green);\n      }\n\n      .formula strong {\n        font-size: 88px;\n        font-weight: 900;\n        line-height: 1;\n      }\n\n      .formula small {\n        color: var(--muted);\n        font-size: 24px;\n        font-weight: 700;\n      }\n\n      .proof-line {\n        display: grid;\n        gap: 14px;\n        padding: 32px 36px;\n        background: rgb(255 255 255 / 78%);\n        border: 1px solid rgb(15 122 79 / 20%);\n        border-radius: var(--radius);\n      }\n\n      .proof-line strong {\n        font-size: 32px;\n        font-weight: 900;\n        line-height: 1.3;\n      }\n\n      .proof-line span {\n        color: var(--muted);\n        font-size: 24px;\n        font-weight: 600;\n        line-height: 1.7;\n      }\n\n      .formula-note {\n        color: var(--ink);\n        font-size: 26px;\n        font-weight: 700;\n        line-height: 1.7;\n      }\n\n      .source-note {\n        color: var(--muted);\n        font-size: 18px;\n        font-weight: 600;\n        line-height: 1.9;\n      }\n\n      .source-note a {\n        display: inline-block;\n        color: var(--green);\n        font-weight: 800;\n        text-decoration-thickness: 2px;\n        text-underline-offset: 4px;\n      }\n\n      /* ---------- slide 3 : conditions ---------- */\n\n      .principles {\n        display: grid;\n        grid-template-columns: repeat(4, minmax(0, 1fr));\n        gap: 36px;\n      }\n\n      .principle {\n        display: grid;\n        align-content: start;\n        gap: 22px;\n        min-height: 420px;\n        padding: 48px 44px;\n        background: var(--surface);\n        border: 1px solid var(--line);\n        border-radius: var(--radius);\n      }\n\n      .principle .num {\n        color: var(--green);\n        font-size: 24px;\n        font-weight: 900;\n        letter-spacing: 0.12em;\n        font-variant-numeric: tabular-nums;\n      }\n\n      .principle b {\n        font-size: 38px;\n        line-height: 1.25;\n      }\n\n      .principle span {\n        color: var(--muted);\n        font-size: 24px;\n        line-height: 1.8;\n      }\n\n      /* ---------- slide 4 : flow ---------- */\n\n      .flow {\n        display: grid;\n        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr);\n        align-items: stretch;\n        gap: 36px;\n      }\n\n      .flow-box {\n        display: grid;\n        align-content: start;\n        justify-items: start;\n        gap: 26px;\n        min-height: 430px;\n        padding: 52px 48px;\n        background: var(--surface);\n        border: 1px solid var(--line);\n        border-top: 8px solid var(--accent);\n        border-radius: var(--radius);\n      }\n\n      .flow-box .step {\n        color: var(--accent);\n        font-size: 24px;\n        font-weight: 900;\n        letter-spacing: 0.12em;\n      }\n\n      .flow-box strong {\n        font-size: 42px;\n        line-height: 1.25;\n      }\n\n      .flow-box span {\n        color: var(--muted);\n        font-size: 24px;\n        line-height: 1.8;\n      }\n\n      .mini-art {\n        width: 64px;\n        height: 64px;\n        display: grid;\n        place-items: center;\n        border-radius: 14px;\n        background: var(--accent-soft);\n        color: var(--accent);\n      }\n\n      .arrow {\n        align-self: center;\n        display: grid;\n        place-items: center;\n        color: var(--green);\n      }\n\n      .arrow svg,\n      .mini-art svg,\n      .avatar svg {\n        display: block;\n      }\n\n      /* ---------- agent slides ---------- */\n\n      .agent-grid {\n        display: grid;\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n        gap: 48px;\n      }\n\n      .agent-card {\n        display: grid;\n        grid-template-rows: auto auto 1fr auto;\n        gap: 32px;\n        padding: 52px;\n        background: var(--surface);\n        border: 1px solid var(--line);\n        border-left: 10px solid var(--accent);\n        border-radius: var(--radius);\n      }\n\n      .agent-card {\n        position: relative;\n        overflow: hidden;\n        isolation: isolate;\n        --character-art: none;\n      }\n\n      .agent-card::before {\n        content: \"\";\n        position: absolute;\n        right: -52px;\n        bottom: -126px;\n        width: 500px;\n        height: 740px;\n        background: var(--character-art) right bottom / contain no-repeat;\n        opacity: 1;\n        filter: saturate(1.18) contrast(1.22) drop-shadow(0 22px 28px rgb(20 33 29 / 20%));\n        transform: rotate(-2deg);\n        transform-origin: 70% 80%;\n        pointer-events: none;\n        z-index: 0;\n      }\n\n      .agent-card:nth-child(even)::before {\n        right: -42px;\n        transfo ck;\n        border-radius: var(--radius);\n        border: 1px solid rgb(20 33 29 / 14%);\n        box-shadow: 0 26px 70px rgb(20 33 29 / 18%);\n      }\n\n      .intro-mascot {\n        position: absolute;\n        left: -88px;\n        bottom: -76px;\n        width: 190px;\n        filter: drop-shadow(0 22px 30px rgb(20 33 29 / 18%));\n        transform: rotate(-4deg);\n      }\n\n      /* ---------- final recruit slide ---------- */\n\n      .recruit-company {\n        display: grid;\n        place-items: center;\n        padding: 0;\n        background: #2da6b5;\n        overflow: hidden;\n      }\n\n      .recruit-company::after {\n        display: none;\n      }\n\n      .recruit-company .recruit-art {\n        width: 100%;\n        height: 100%;\n        object-fit: contain;\n        display: block;\n      }\n\n      .recruit-company .recruit-qr {\n        position: absolute;\n        right: 92px;\n        bottom: 72px;\n        z-index: 3;\n        width: 250px;\n        display: grid;\n        justify-items: center;\n        gap: 12px;\n        padding: 18px;\n        background: rgb(255 255 255 / 96%);\n        border: 1px solid rgb(20 33 29 / 12%);\n        border-radius: 10px;\n        box-shadow: 0 24px 60px rgb(20 33 29 / 18%);\n        color: var(--ink);\n        text-decoration: none;\n      }\n\n      .recruit-company .recruit-qr img {\n        width: 100%;\n        aspect-ratio: 1;\n        display: block;\n      }\n\n      .recruit-company .recruit-qr span {\n        color: var(--muted);\n        font-size: 18px;\n        font-weight: 900;\n        line-height: 1;\n      }\n\n      .recruit-company .recruit-qr strong {\n        color: #f45c79;\n        font-size: 24px;\n        font-weight: 900;\n        line-height: 1.15;\n        text-align: center;\n      }\n\n\n\n      /* ---------- browser fullscreen control ---------- */\n\n      .deck-fullscreen {\n        position: fixed;\n        right: 34px;\n        bottom: 34px;\n        z-index: 1000;\n        width: 62px;\n        height: 62px;\n        display: grid;\n        place-items: center;\n        border: 0;\n        border-radius: 999px;\n        background: rgb(20 33 29 / 94%);\n        color: white;\n        box-shadow: 0 16px 40px rgb(0 0 0 / 22%);\n        cursor: pointer;\n      }\n\n      .deck-fullscreen:hover,\n      .deck-fullscreen:focus-visible,\n      .deck-fullscreen.is-active {\n        background: var(--green);\n        outline: 4px solid rgb(15 122 79 / 24%);\n        outline-offset: 3px;\n      }\n\n      .deck-fullscreen:disabled {\n        opacity: 0.45;\n        cursor: not-allowed;\n      }\n\n      body.is-presentation {\n        display: block;\n        min-height: 100dvh;\n        overflow: hidden;\n        background: var(--paper);\n      }\n\n      body.is-presentation deck-stage {\n        --deck-rail-w: 0px !important;\n        position: fixed;\n        inset: 0;\n        width: 100vw !important;\n        height: 100dvh !important;\n        max-width: none !important;\n        max-height: none !important;\n        margin: 0 !important;\n      }\n\n      body.is-presentation .deck-fullscreen {\n        right: 20px;\n        bottom: 20px;\n      }\n\n    </style>\n  </head>\n  <body>\n    <deck-stage width=\"1920\" height=\"1080\">\n      <section class=\"hero\" data-label=\"表紙\">\n        <div class=\"hero-copy\">\n          <p class=\"kicker\">K-BA-MAN STRATEGY DECK</p>\n          <h1>競馬予想は、<br>ひとりで悩むより<br>10人で割る。</h1>\n          <p class=\"lead\">独立した10人の agent が、血統・統計・展開・馬場・オッズを別々の角度から読み、最後に平均でノイズをならす作戦会議です。</p>\n        </div>\n        <div class=\"track-visual\" aria-hidden=\"true\">\n          <div class=\"track\">\n            <span class=\"runner r1\">1</span>\n            <span class=\"runner r2\">2</span>\n            <span class=\"runner r3\">3</span>\n            <span class=\"runner r4\">4</span>\n            <span class=\"runner r5\">5</span>\n            <span class=\"runner r6\">6</span>\n            <span class=\"runner r7\">7</span>\n            <span class=\"runner r8\">8</span>\n            <span class=\"runner r9\">9</span>\n            <span class=\"runner r10\">10</span>\n          </div>\n        </div>\n      </section>\n\n      <section class=\"self-introduction\" data-label=\"自己紹介\">\n        <div class=\"self-intro-copy\">\n          <p class=\"kicker\">ABOUT ME</p>\n          <h2>自己紹介</h2>\n          <ul class=\"intro-list\" aria-label=\"自己紹介\">\n            <li class=\"red\"><span class=\"mini-icon\">会</span><span><strong>株式会社Gemcook</strong><span>大切な誰かを喜ばせるアプリを作る会社です。</span></span></li>\n            <li class=\"blue\"><span class=\"mini-icon\">実</span><span><strong>フロントエンド / バックエンドエンジニア兼任</strong><span>UIからAPI、運用までまとめて作ります。</span></span></li>\n            <li class=\"green\"><span class=\"mini-icon\">AI</span><span><strong>AI駆動開発勉強会（大阪支部）運営</strong><span>関西からAI時代の開発スタイルを盛り上げています。</span></span></li>\n          </ul>\n        </div>\n        <div class=\"intro-visual\" aria-label=\"AI駆動開発勉強会 大阪\">\n          <img class=\"intro-flyer\" src=\"assets/ai-driven-development-osaka.png\" alt=\"AI駆動開発勉強会 大阪 第12回 告知画像\">\n          <img class=\"intro-mascot\" src=\"assets/gemcook-mascot-peek.png\" alt=\"\" aria-hidden=\"true\">\n        </div>\n      </section>\n\n      <section class=\"wisdom\" data-label=\"集合知の法則\">\n        <div class=\"wisdom-copy\">\n          <p class=\"kicker\">WISDOM OF CROWDS</p>\n          <h2>予想の平均は、<br>平均的な一人より強い。</h2>\n          <p class=\"lead\">これは雰囲気ではなく、Diversity Prediction Theorem で出てくる数学的な帰結です。一人の予想に出る癖も、独立した複数予想を平均すると打ち消されやすくなります。</p>\n        </div>\n        <div class=\"formula-card\">\n          <div class=\"formula\">\n            <strong>E = M − D</strong>\n            <small>群衆誤差 = 個人平均誤差 − 多様性</small>\n          </div>\n          <div class=\"proof-line\">\n            <strong>D ≥ 0 なので、E ≤ M</strong>\n            <span>つまり、集団平均の二乗誤差は、個人予想の平均二乗誤差以下になる。</span>\n          </div>\n          <p class=\"formula-note\">だから作戦はシンプル。そこそこ当てる10人を、違う理由で悩ませる。</p>\n          <p class=\"source-note\">Source: Scott E. Page, <a href=\"https://www.engineering.pitt.edu/contentassets/0192c0e1473b41a08c125c46e2a5dd51/making-the-difference--applying-a-logic-of-diversity.pdf\" target=\"_blank\" rel=\"noreferrer\">Diversity Prediction Theorem</a> / <a href=\"https://shs.cairn.info/article/E_RFSP_675_0899?lang=en\" target=\"_blank\" rel=\"noreferrer\">Crowd Beats Averages Law</a></p>\n        </div>\n      </section>\n\n      <section data-label=\"成立条件\">\n        <div class=\"slide-head\">\n          <p class=\"kicker\">4 CONDITIONS</p>\n          <h2>集合知が効くための4条件</h2>\n        </div>\n        <div class=\"principles\">\n          <div class=\"principle\">\n            <span class=\"num\">01</span>\n            <b>多様性</b>\n            <span>血統派、統計派、穴党、馬場読み。信じるものをあえて散らす。</span>\n          </div>\n          <div class=\"principle\">\n            <span class=\"num\">02</span>\n            <b>独立性</b>\n            <span>他の agent の印を見せない。全員で同じ空気に飲まれない。</span>\n          </div>\n          <div class=\"principle\">\n            <span class=\"num\">03</span>\n            <b>分散性</b>\n            <span>それぞれが自分の局所知識を深掘る。全員が総合評論家にならない。</span>\n          </div>\n          <div class=\"principle\">\n            <span class=\"num\">04</span>\n            <b>集約</b>\n            <span>最後は確率を混ぜる。声の大きさではなく、分布としてまとめる。</span>\n          </div>\n        </div>\n      </section>\n\n      <section data-label=\"作戦フロー\">\n        <div class=\"slide-head\">\n          <p class=\"kicker\">RACE OPERATION</p>\n          <h2>作戦は、入力を揃えて出力を混ぜる。</h2>\n        </div>\n        <div class=\"flow\">\n          <div class=\"flow-box green\">\n            <span class=\"step\">STEP 1</span>\n            <div class=\"mini-art\" aria-hidden=\"true\">\n              <svg width=\"34\" height=\"34\" viewBox=\"0 0 26 26\" fill=\"none\">\n                <rect x=\"5\" y=\"3\" width=\"16\" height=\"20\" rx=\"2\" stroke=\"currentColor\" stroke-width=\"2\"></rect>\n                <path d=\"M9 8h8M9 13h8M9 18h5\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"></path>\n              </svg>\n            </div>\n            <strong>RaceDataPack</strong>\n            <span>出馬表、過去走、調教、天気、馬場を同じファイルで配布。</span>\n          </div>\n          <div class=\"arrow\" aria-hidden=\"true\">\n            <svg width=\"56\" height=\"56\" viewBox=\"0 0 42 42\" fill=\"none\">\n              <path d=\"M8 21h24M24 13l8 8-8 8\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n            </svg>\n          </div>\n          <div class=\"flow-box blue\">\n            <span class=\"step\">STEP 2</span>\n            <div class=\"mini-art\" aria-hidden=\"true\">\n              <svg width=\"36\" height=\"36\" viewBox=\"0 0 28 28\" fill=\"none\">\n                <circle cx=\"9\" cy=\"9\" r=\"4\" stroke=\"currentColor\" stroke-width=\"2\"></circle>\n                <circle cx=\"19\" cy=\"9\" r=\"4\" stroke=\"currentColor\" stroke-width=\"2\"></circle>\n                <circle cx=\"14\" cy=\"19\" r=\"4\" stroke=\"currentColor\" stroke-width=\"2\"></circle>\n              </svg>\n            </div>\n            <strong>10人が独立予想</strong>\n            <span>同じ事実を見て、違う流派で勝ち馬確率を出す。</span>\n          </div>\n          <div class=\"arrow\" aria-hidden=\"true\">\n            <svg width=\"56\" height=\"56\" viewBox=\"0 0 42 42\" fill=\"none\">\n              <path d=\"M8 21h24M24 13l8 8-8 8\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n            </svg>\n          </div>\n          <div class=\"flow-box gold\">\n            <span class=\"step\">STEP 3</span>\n            <div class=\"mini-art\" aria-hidden=\"true\">\n              <svg width=\"36\" height=\"36\" viewBox=\"0 0 28 28\" fill=\"none\">\n                <path d=\"M5 21l5-6 4 3 8-11\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n                <path d=\"M5 23h18\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"></path>\n              </svg>\n            </div>\n            <strong>確率を集約</strong>\n            <span>平均順位、Borda、log pooling で、ひとつの最終予想へ。</span>\n          </div>\n        </div>\n      </section>\n\n      <section data-label=\"agent 龍之介と誠\">\n        <div class=\"slide-head\">\n          <p class=\"kicker\">AGENT 01–02</p>\n          <h2>血筋の語り部と、数式の裁判官。</h2>\n        </div>\n        <div class=\"agent-grid\">\n          <article class=\"agent-card red\" style=\"--character-art: url('../assets/characters/tatsunosuke/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <path d=\"M14 39c2-14 10-24 26-26-2 14-10 24-26 26Z\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></path>\n                  <path d=\"M21 32c6-2 11-6 15-12\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">血統・配合派</span>\n                <h3>龍之介</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「父系と母系をたどれば、阪神2200mの顔つきが見えます」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">血</span><span>スタミナ血統、道悪適性、内回りで粘れる配合を見る。</span></li>\n              <li><span class=\"mini-icon\">読</span><span>馬柱を家系図として読むので、説明が妙に叙情的。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">Claude Opus</span>\n              <span class=\"badge\">high effort</span>\n            </div>\n          </article>\n\n          <article class=\"agent-card blue\" style=\"--character-art: url('../assets/characters/makoto/real.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <rect x=\"10\" y=\"12\" width=\"34\" height=\"30\" rx=\"4\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></rect>\n                  <path d=\"M16 22h22M16 29h22M16 36h12\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">データ・統計派</span>\n                <h3>誠</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「印象はログに残りません。数字をください」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">式</span><span>年齢、前走G1、枠順、過去傾向をファクター化する。</span></li>\n              <li><span class=\"mini-icon\">無</span><span>寡黙だが、スコア表だけは饒舌。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">codex</span>\n              <span class=\"badge\">high effort</span>\n            </div>\n          </article>\n        </div>\n      </section>\n\n      <section data-label=\"agent 美咲と健太\">\n        <div class=\"slide-head\">\n          <p class=\"kicker\">AGENT 03–04</p>\n          <h2>脳内実況と、指数表の番人。</h2>\n        </div>\n        <div class=\"agent-grid\">\n          <article class=\"agent-card violet\" style=\"--character-art: url('../assets/characters/misaki/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <path d=\"M13 34c8-13 20-13 28 0\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                  <path d=\"M16 25h22M18 18h18\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                  <circle cx=\"19\" cy=\"35\" r=\"4\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                  <circle cx=\"35\" cy=\"35\" r=\"4\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">展開・ペース読み派</span>\n                <h3>美咲</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「3角で息が入って、4角で一斉に動く未来が見えます」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">流</span><span>逃げ、先行、差しの配置からレースを脳内再生する。</span></li>\n              <li><span class=\"mini-icon\">強</span><span>速いペースでも遅いペースでも残る馬を好む。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">Claude Opus</span>\n              <span class=\"badge\">medium effort</span>\n            </div>\n          </article>\n\n          <article class=\"agent-card green\" style=\"--character-art: url('../assets/characters/kenta/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <path d=\"M11 38h32\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                  <path d=\"M16 34V22M27 34V14M38 34V26\" stroke=\"currentColor\" stroke-width=\"5\" stroke-linecap=\"round\"></path>\n                  <path d=\"M14 15h27\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">スピード指数派</span>\n                <h3>健太</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「速い馬が速い。以上です」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">指</span><span>直近5走の最高値、平均値、類似条件の指数を比較。</span></li>\n              <li><span class=\"mini-icon\">即</span><span>迷いが少ない。指数差が大きいときはかなり強気。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">Claude Sonnet</span>\n              <span class=\"badge\">low effort</span>\n            </div>\n          </article>\n        </div>\n      </section>\n\n      <section data-label=\"agent 鉄平とさくら\">\n        <div class=\"slide-head\">\n          <p class=\"kicker\">AGENT 05–06</p>\n          <h2>早朝の坂路職人と、寝ぼけ眼の情報強者。</h2>\n        </div>\n        <div class=\"agent-grid\">\n          <article class=\"agent-card gold\" style=\"--character-art: url('../assets/characters/teppei/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <path d=\"M11 39c8-4 16-4 24 0 3 2 6 2 8-1\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                  <path d=\"M17 17h20l-4 14H21l-4-14Z\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linejoin=\"round\"></path>\n                  <path d=\"M22 13h10\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">調教・仕上がり派</span>\n                <h3>鉄平</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「時計より、最後の1Fでまだ余ってるかです」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">追</span><span>最終追切、坂路時計、併走馬との手応えで仕上がり判定。</span></li>\n              <li><span class=\"mini-icon\">朝</span><span>朝が早い。人間側の眠気もファクターに入れそう。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">codex</span>\n              <span class=\"badge\">medium effort</span>\n            </div>\n          </article>\n\n          <article class=\"agent-card red\" style=\"--character-art: url('../assets/characters/sakura/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <path d=\"M12 36c7-14 15-16 22-8l8-12\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n                  <circle cx=\"15\" cy=\"36\" r=\"4\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                  <circle cx=\"34\" cy=\"28\" r=\"4\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                  <circle cx=\"42\" cy=\"16\" r=\"4\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">オッズ・市場分析派</span>\n                <h3>さくら</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「市場は賢いです。でも時々、全員で同じ勘違いをします」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">市</span><span>単勝と複勝のズレ、ファン投票と市場評価の温度差を見る。</span></li>\n              <li><span class=\"mini-icon\">眠</span><span>寝ぼけ眼でも、スマホとウォッチの通知から乖離を拾う。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">Claude Haiku</span>\n              <span class=\"badge\">medium effort</span>\n            </div>\n          </article>\n        </div>\n      </section>\n\n      <section data-label=\"agent 葵と陽菜\">\n        <div class=\"slide-head\">\n          <p class=\"kicker\">AGENT 07–08</p>\n          <h2>人馬関係ウォッチャーと、逆張りの火付け役。</h2>\n        </div>\n        <div class=\"agent-grid\">\n          <article class=\"agent-card blue\" style=\"--character-art: url('../assets/characters/aoi/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <circle cx=\"21\" cy=\"22\" r=\"8\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                  <circle cx=\"36\" cy=\"25\" r=\"6\" fill=\"white\" stroke=\"currentColor\" stroke-width=\"3\"></circle>\n                  <path d=\"M10 43c3-8 9-12 17-12s14 4 17 12\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">騎手・厩舎派</span>\n                <h3>葵</h3>\n              </div>\n            </div>\n            <p class=\"quote\">「馬は強い。でも誰が乗るかで、強さの出方が変わります」</p>\n            <ul class=\"watch-list\">\n              <li><span class=\"mini-icon\">人</span><span>騎手成績、厩舎、コンビ実績、乗り替わりを加点減点。</span></li>\n              <li><span class=\"mini-icon\">観</span><span>人間観察が鋭い。コメント欄の空気まで読みそう。</span></li>\n            </ul>\n            <div class=\"badge-line\">\n              <span class=\"badge\">Claude Sonnet</span>\n              <span class=\"badge\">medium effort</span>\n            </div>\n          </article>\n\n          <article class=\"agent-card violet\" style=\"--character-art: url('../assets/characters/hina/mid.png')\">\n            <div class=\"agent-head\">\n              <div class=\"avatar\" aria-hidden=\"true\">\n                <svg width=\"68\" height=\"68\" viewBox=\"0 0 54 54\" fill=\"none\">\n                  <path d=\"M14 36l26-18\" stroke=\"currentColor\" stroke-width=\"4\" stroke-linecap=\"round\"></path>\n                  <path d=\"M18 18h18v18\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n                  <path d=\"M18 36h18\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"></path>\n                </svg>\n              </div>\n              <div class=\"agent-name\">\n                <span class=\"role\">穴党・逆 \n      </section>\n    </deck-stage>\n\n\n    <button class=\"deck-fullscreen\" type=\"button\" aria-label=\"全画面表示\" title=\"全画面\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n        <path d=\"M8 3H3v5M16 3h5v5M8 21H3v-5M21 16v5h-5\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path>\n      </svg>\n    </button>\n    <script>\n      (() => {\n        const fullscreenButton = document.querySelector('.deck-fullscreen');\n        if (!fullscreenButton) return;\n        let fallbackPresentation = false;\n\n        async function toggleFullscreen() {\n          const isPresentation = document.body.classList.contains('is-presentation');\n\n          if (!document.fullscreenElement) {\n            if (isPresentation) {\n              document.body.classList.remove('is-presentation');\n              fallbackPresentation = false;\n              syncFullscreenButton();\n              return;\n            }\n\n            try {\n              await document.documentElement.requestFullscreen();\n              fallbackPresentation = false;\n              document.body.classList.add('is-presentation');\n            } catch {\n              fallbackPresentation = true;\n              document.body.classList.add('is-presentation');\n            }\n\n            syncFullscreenButton();\n            return;\n          }\n\n          fallbackPresentation = false;\n          await document.exitFullscreen();\n        }\n\n        function saveOriginalStyle(element) {\n          if (!element || element.dataset.codexOriginalStyle !== undefined) return;\n          element.dataset.codexOriginalStyle = element.getAttribute('style') || '';\n        }\n\n        function restoreOriginalStyle(element) {\n          if (!element || element.dataset.codexOriginalStyle === undefined) return;\n          const originalStyle = element.dataset.codexOriginalStyle;\n          if (originalStyle) {\n            element.setAttribute('style', originalStyle);\n          } else {\n            element.removeAttribute('style');\n          }\n          delete element.dataset.codexOriginalStyle;\n        }\n\n        function syncDeckStageCanvas() {\n          const deck = document.querySelector('deck-stage');\n          const root = deck && deck.shadowRoot;\n          if (!deck || !root) return;\n\n          const stage = root.querySelector('.stage');\n          const canvas = root.querySelector('.canvas');\n          const rail = root.querySelector('.rail');\n          const railResize = root.querySelector('.rail-resize');\n          const overlay = root.querySelector('.overlay');\n          const targets = [stage, canvas, rail, railResize, overlay];\n          const isFullscreen = Boolean(document.fullscreenElement) || document.body.classList.contains('is-presentation');\n\n          if (!isFullscreen) {\n            targets.forEach(restoreOriginalStyle);\n            return;\n          }\n\n          targets.forEach(saveOriginalStyle);\n          if (rail) rail.style.display = 'none';\n          if (railResize) railResize.style.display = 'none';\n          if (stage) {\n            stage.style.inset = '0';\n            stage.style.left = '0';\n            stage.style.width = '100vw';\n            stage.style.height = '100dvh';\n          }\n          if (canvas) {\n            const designWidth = Number(deck.getAttribute('width')) || 1920;\n            const designHeight = Number(deck.getAttribute('height')) || 1080;\n            const scale = Math.min(window.innerWidth / designWidth, window.innerHeight / designHeight);\n            canvas.style.width = designWidth + 'px';\n            canvas.style.height = designHeight + 'px';\n            canvas.style.transform = 'scale(' + scale + ')';\n            canvas.style.transformOrigin = 'center center';\n          }\n          if (overlay) overlay.style.marginLeft = '0';\n        }\n\n        function syncFullscreenButton() {\n          const isFullscreen = Boolean(document.fullscreenElement) || document.body.classList.contains('is-presentation');\n          fullscreenButton.classList.toggle('is-active', isFullscreen);\n          fullscreenButton.setAttribute('aria-label', isFullscreen ? '全画面を解除' : '全画面表示');\n          fullscreenButton.title = isFullscreen ? '全画面解除' : '全画面';\n          syncDeckStageCanvas();\n        }\n\n        fullscreenButton.addEventListener('click', () => {\n          toggleFullscreen().catch(() => {});\n        });\n\n        document.addEventListener('fullscreenchange', () => {\n          if (!document.fullscreenElement && !fallbackPresentation) {\n            document.body.classList.remove('is-presentation');\n          }\n          syncFullscreenButton();\n        });\n        window.addEventListener('resize', syncDeckStageCanvas);\n        document.addEventListener('keydown', (event) => {\n          if (event.key.toLowerCase() !== 'f') return;\n          event.preventDefault();\n          toggleFullscreen().catch(() => {});\n        });\n\n        syncFullscreenButton();\n      })();\n    <\/script>\n    <script src=\"0a99e680-15c3-4a7e-9d9e-b572968062b7\"><\/script>\n  \n\n  \n\n</body></html>"
